server:
  port: 8080
  tomcat:
    max-http-form-content-size: 50MB
    max-swallow-size: 50MB

spring:
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
  codec:
    max-in-memory-size: 50MB
  config:
    import:
      - optional:file:.env[.properties]
      - optional:file:code-arena-backend/.env[.properties]
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/code_arena_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
  mail:
    host: smtp.gmail.com
    port: 587
    username: hazem.mtir10@gmail.com
    password: pabmozhfmsmbzayi
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          ssl:
            protocols: TLSv1.2
            trust: "*"

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: https://${AUTH0_DOMAIN}/
          audiences: ${AUTH0_AUDIENCE}

auth0:
  domain: ${AUTH0_DOMAIN}
  client-id: ${AUTH0_CLIENT_ID}
  client-secret: ${AUTH0_CLIENT_SECRET}
  audience: ${AUTH0_AUDIENCE}
  management-api-audience: https://${AUTH0_DOMAIN}/api/v2/

  cors:
    allowed-origins:
      - http://localhost:4200

stripe:
  secret-key: ${STRIPE_SECRET_KEY:sk_test_placeholder}
  publishable-key: ${STRIPE_PUBLISHABLE_KEY:pk_test_placeholder}

huggingface:
  api-key: ${HUGGINGFACE_API_KEY:}

application:
  admin:
    email: ${ADMIN_EMAIL:hazem@gmail.com}
