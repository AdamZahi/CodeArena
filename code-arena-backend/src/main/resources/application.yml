# Piston (self-hosted code execution engine)
piston:
  base-url: http://192.168.0.195:2000
  run-timeout-ms: 15000
  memory-limit-bytes: 256000000

# Battle time limits per mode (in minutes, -1 = no limit)
battle:
  time-limit:
    duel-minutes: 30
    team-minutes: 40
    ranked-arena-minutes: 25
    blitz-minutes: 15
    practice-minutes: -1
    daily-minutes: -1
  # Score Ranker microservice (Python FastAPI wrapping ranker_model.pkl).
  # Falls back to a time-based estimate if unreachable, so battles never break.
  ranker:
    base-url: http://localhost:8010
    connect-timeout-ms: 1500
    read-timeout-ms: 4000
    enabled: true
  # Complexity Classifier microservice (Python FastAPI wrapping CodeBERT).
  # Predicts a Big-O class (O(1) … O(2^n)) for each submission. Submissions
  # keep resolving even when the classifier is offline — a fallback result
  # with score=0.0 is persisted instead.
  classifier:
    base-url: http://localhost:8011
    connect-timeout-ms: 1500
    read-timeout-ms: 8000
    enabled: true

# Code Execution Engines (module1_challenge)
execution:
  piston:
    enabled: true
    base-url: http://192.168.0.163:2000/api/v2
    timeout-seconds: 10
    compile-timeout-ms: 3000
    run-timeout-ms: 3000
  judge0:
    base-url: https://ce.judge0.com
    api-key: ""
    timeout-seconds: 10

# Resilience4j Circuit Breaker for Piston
resilience4j:
  circuitbreaker:
    instances:
      pistonEngine:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
