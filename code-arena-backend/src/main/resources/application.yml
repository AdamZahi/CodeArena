server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/code_arena_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: ""
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${GMAIL_EMAIL}
    password: ${GMAIL_APP_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: true
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: https://dev-70do2fpg2iw11ckn.us.auth0.com/
          jwk-set-uri: https://dev-70do2fpg2iw11ckn.us.auth0.com/.well-known/jwks.json
          audiences: https://codearena.com/api

keycloak:
  realm: code-arena
  client-id: code-arena-backend
  server-url: http://localhost:8081

app:
  cors:
    allowed-origins:
      - http://localhost:4200
  shop:
    admin-email: islemazzouz04@gmail.com

stripe:
  secret-key: ${STRIPE_SECRET_KEY}
  webhook-secret: ${STRIPE_WEBHOOK_SECRET}