name: CI

on:
  pull_request:
  push:
    branches: [ main, develop ]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: code-arena-backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - name: Build backend
        run: ./mvnw -B clean verify

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: code-arena-frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install
        run: npm ci
      - name: Build frontend
        run: npm run build
