<div class="shop-container">
  <div class="shop-header">
    <div class="shop-title">
      <h1>⚔ CREATE EVENT</h1>
      <p>// BUILD YOUR NEXT CHALLENGE</p>
    </div>
  </div>

  <form class="create-card" (ngSubmit)="submit()" #eventForm="ngForm" novalidate>
    <!-- Title -->
    <label class="form-label">TITLE</label>
    <input
      class="event-input"
      type="text"
      name="title"
      [(ngModel)]="title"
      #titleModel="ngModel"
      placeholder="Enter event title"
      required
      minlength="3"
      maxlength="100"
      [class.input-error]="titleModel.invalid && (titleModel.dirty || titleModel.touched)"
    />
    <div class="field-error" *ngIf="titleModel.invalid && (titleModel.dirty || titleModel.touched)">
      <span *ngIf="titleModel.errors?.['required']">Title is required.</span>
      <span *ngIf="titleModel.errors?.['minlength']">Minimum 3 characters.</span>
    </div>

    <!-- Description -->
    <label class="form-label">DESCRIPTION</label>
    <textarea
      class="event-textarea"
      name="description"
      [(ngModel)]="description"
      #descModel="ngModel"
      placeholder="Describe the event..."
      rows="5"
      required
      minlength="10"
      [class.input-error]="descModel.invalid && (descModel.dirty || descModel.touched)"
    ></textarea>
    <div class="field-error" *ngIf="descModel.invalid && (descModel.dirty || descModel.touched)">
      <span *ngIf="descModel.errors?.['required']">Description is required.</span>
      <span *ngIf="descModel.errors?.['minlength']">Minimum 10 characters.</span>
    </div>

    <!-- Location -->
    <label class="form-label">LOCATION</label>
    <input
      class="event-input"
      type="text"
      name="location"
      [(ngModel)]="location"
      #locModel="ngModel"
      placeholder="Event Location (or Virtual)"
      required
      [class.input-error]="locModel.invalid && (locModel.dirty || locModel.touched)"
    />
    <div class="field-error" *ngIf="locModel.invalid && (locModel.dirty || locModel.touched)">
      Location is required.
    </div>

    <!-- Type Toggle -->
    <div class="section-title">TYPE</div>
    <div class="type-toggle">
      <button
        type="button"
        class="type-toggle-btn"
        [class.active]="eventType === 'OPEN'"
        [class.open-active]="eventType === 'OPEN'"
        (click)="eventType = 'OPEN'"
      >
        [ OPEN ]
      </button>
      <button
        type="button"
        class="type-toggle-btn"
        [class.active]="eventType === 'EXCLUSIVE'"
        [class.exclusive-active]="eventType === 'EXCLUSIVE'"
        (click)="eventType = 'EXCLUSIVE'"
      >
        [ EXCLUSIVE ]
      </button>
    </div>
    <div class="exclusive-note" *ngIf="eventType === 'EXCLUSIVE'">
      ⭐ TOP 10 PLAYERS WILL BE AUTO-INVITED
    </div>

    <!-- Category -->
    <label class="form-label">CATEGORY</label>
    <select class="event-select" name="category" [(ngModel)]="category">
      <option value="HACKATHON">HACKATHON</option>
      <option value="NETWORKING">NETWORKING</option>
      <option value="BOOTCAMP">BOOTCAMP</option>
      <option value="CONFERENCE">CONFERENCE</option>
      <option value="REMISE_PRIX">REMISE_PRIX</option>
    </select>

    <!-- Dates -->
    <div class="dates-grid">
      <div class="date-col">
        <label class="form-label">START DATE</label>
        <input
          class="event-input"
          type="datetime-local"
          name="startDate"
          [(ngModel)]="startDate"
          #startModel="ngModel"
          required
          [class.input-error]="startModel.invalid && (startModel.dirty || startModel.touched)"
        />
      </div>
      <div class="date-col">
        <label class="form-label">END DATE</label>
        <input
          class="event-input"
          type="datetime-local"
          name="endDate"
          [(ngModel)]="endDate"
          #endModel="ngModel"
          required
          [class.input-error]="endModel.invalid && (endModel.dirty || endModel.touched)"
        />
      </div>
    </div>
    <div class="field-error" *ngIf="(startModel.invalid && (startModel.dirty || startModel.touched)) || (endModel.invalid && (endModel.dirty || endModel.touched))">
      Both dates are required.
    </div>

    <!-- Max participants -->
    <label class="form-label">MAX PARTICIPANTS</label>
    <input
      class="event-input"
      type="number"
      name="maxParticipants"
      min="1"
      max="1000"
      [(ngModel)]="maxParticipants"
      #maxModel="ngModel"
      required
      [class.input-error]="maxModel.invalid && (maxModel.dirty || maxModel.touched)"
    />
    <div class="field-error" *ngIf="maxModel.invalid && (maxModel.dirty || maxModel.touched)">
      Must be between 1 and 1000.
    </div>

    <!-- Status -->
    <label class="form-label">STATUS</label>
    <select class="event-select" name="status" [(ngModel)]="status">
      <option value="UPCOMING">UPCOMING</option>
      <option value="ACTIVE">ACTIVE</option>
      <option value="COMPLETED">COMPLETED</option>
    </select>

    <!-- Error -->
    <div class="search-error" *ngIf="errorMessage">{{ errorMessage }}</div>
    <div class="success-msg" *ngIf="successMessage">{{ successMessage }}</div>

    <!-- Submit -->
    <button class="checkout-btn" type="submit" [disabled]="isSubmitting || eventForm.invalid">
      {{ isSubmitting ? 'CREATING...' : '[ CREATE EVENT ]' }}
    </button>
  </form>

</div>
