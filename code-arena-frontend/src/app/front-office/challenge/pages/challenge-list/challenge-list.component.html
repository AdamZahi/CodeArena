<div class="lc-container">
  <!-- HEADER BAR -->
  <div class="lc-header">
    <div class="lc-header-left">
      <span class="lc-logo">⚔️ CODE<span class="accent">ARENA</span></span>
      <span class="lc-separator">|</span>
      <span class="lc-nav-item active">Problems</span>
    </div>
  </div>

  <!-- TAG BAR -->
  <div class="tag-bar">
    <div class="tag-list">
      <button class="tag-chip" [class.active]="selectedDifficulty === ''" (click)="filterByDifficulty('')">All Topics</button>
      <button class="tag-chip" [class.active]="selectedDifficulty === 'EASY'" (click)="filterByDifficulty('EASY')">Easy</button>
      <button class="tag-chip" [class.active]="selectedDifficulty === 'MEDIUM'" (click)="filterByDifficulty('MEDIUM')">Medium</button>
      <button class="tag-chip" [class.active]="selectedDifficulty === 'HARD'" (click)="filterByDifficulty('HARD')">Hard</button>
    </div>
    <div class="search-box">
      <span class="search-icon">🔍</span>
      <input type="text" class="search-input" placeholder="Search questions" [(ngModel)]="searchTerm" (input)="onSearch()" />
    </div>
  </div>

  <!-- LOADING -->
  <div class="lc-loading" *ngIf="isLoading">
    <div class="spinner"></div>
    Loading problems...
  </div>

  <!-- PROBLEM TABLE -->
  <div class="lc-table-wrap" *ngIf="!isLoading">
    <table class="lc-table">
      <thead>
        <tr>
          <th class="col-status">Status</th>
          <th class="col-title">Title</th>
          <th class="col-acceptance">Tags</th>
          <th class="col-difficulty">Difficulty</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let c of filteredChallenges; let i = index"
            class="lc-row"
            [class.even]="i % 2 === 0"
            (click)="goToChallenge(c.id)">
          <td class="col-status">
            <span class="status-dot"></span>
          </td>
          <td class="col-title">
            <span class="problem-number">{{ i + 1 }}.</span>
            <span class="problem-title">{{ c.title }}</span>
          </td>
          <td class="col-acceptance">
            <span class="tag-mini" *ngFor="let tag of getTags(c.tags)">{{ tag }}</span>
          </td>
          <td class="col-difficulty">
            <span class="diff-pill"
                  [class.easy]="c.difficulty === 'EASY'"
                  [class.medium]="c.difficulty === 'MEDIUM'"
                  [class.hard]="c.difficulty === 'HARD'">
              {{ c.difficulty === 'EASY' ? 'Easy' : c.difficulty === 'MEDIUM' ? 'Med.' : 'Hard' }}
            </span>
          </td>
        </tr>
      </tbody>
    </table>
    <div class="lc-empty" *ngIf="filteredChallenges.length === 0">
      No problems found.
    </div>
    <div class="lc-footer">
      <span class="lc-count">{{ filteredChallenges.length }} / {{ challenges.length }} problems</span>
    </div>
  </div>
</div>
