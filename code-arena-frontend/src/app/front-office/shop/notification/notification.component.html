<div class="notification-container">
  <div
    *ngFor="let notif of notifications"
    class="notification-toast"
    [class]="getStatusColor(notif.status)"
    [class.visible]="notif.visible"
    [class.hidden]="!notif.visible">

    <div class="notif-icon">{{ getStatusIcon(notif.status) }}</div>

    <div class="notif-body">
      <div class="notif-title">ORDER #{{ notif.orderId }}</div>
      <div class="notif-message">{{ notif.message }}</div>
    </div>

    <button class="notif-close" (click)="dismiss(notif.id)">✕</button>

  </div>
    <!-- ── STOCK ALERTS ─────────────────────── -->
  <div
    *ngFor="let alert of stockAlerts"
    class="notification-toast notif-stock"
    [class.visible]="alert.visible"
    [class.hidden]="!alert.visible">
    <div class="notif-icon">🔥</div>
    <div class="notif-body">
      <div class="notif-title">LOW STOCK ALERT</div>
      <div class="notif-message">{{ alert.message }}</div>
    </div>
    <button class="notif-close" (click)="dismissStock(alert.id)">✕</button>
  </div>

</div>
