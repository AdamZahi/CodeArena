<div class="gift-box">
  <div class="gift-header">
    <p class="gift-title">Support streamer</p>
    <span class="wallet-balance">
      🪙 {{ wallet?.balance ?? 0 }} coins
    </span>
  </div>

  <div class="gift-list">
    <button
      type="button"
      class="gift-card"
      *ngFor="let gift of gifts"
      (click)="sendGift(gift)"
      [disabled]="!canSend(gift.coins)">

      <span class="gift-icon">{{ gift.icon }}</span>
      <span class="gift-label">{{ gift.label }}</span>
      <small>{{ gift.coins }} coins</small>
    </button>
  </div>
</div>
